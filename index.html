<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rafi iPhone</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:#111;

}

/* phone */

.phone{

width:330px;
height:670px;

border-radius:50px;

padding:12px;

background:#000;

box-shadow:0 30px 90px rgba(0,0,0,.7);

}

/* screen */

.screen{

width:100%;
height:100%;

border-radius:40px;

background:url("https://images.unsplash.com/photo-1603575448878-868a20723f6d")
center/cover;

padding:18px;

color:white;

position:relative;

overflow:hidden;

}

/* status bar */

.status{

display:flex;
justify-content:space-between;

font-size:13px;

margin-bottom:20px;

}

/* profile */

.profile{

text-align:center;
margin-bottom:25px;

}

.profile img{

width:70px;
height:70px;

border-radius:50%;

border:2px solid white;

}

/* apps */

.apps{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:22px;

margin-top:10px;

}

.app{

text-align:center;
cursor:pointer;

transition:.2s;

}

.app:hover{

transform:scale(1.1);

}

.icon{

width:60px;
height:60px;

border-radius:18px;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;

margin:auto;
margin-bottom:5px;

}

/* icon colors */

.social{background:#0ea5e9}
.gallery{background:#ec4899}
.music{background:#f43f5e}
.notes{background:#facc15}
.about{background:#22c55e}
.settings{background:#64748b}

/* dock */

.dock{

position:absolute;
bottom:15px;
left:10px;
right:10px;

background:rgba(255,255,255,.2);

backdrop-filter:blur(15px);

border-radius:25px;

padding:10px;

display:flex;
justify-content:space-around;

}

.dock .icon{

width:50px;
height:50px;

}

/* pages */

.page{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:#0f172a;

padding:20px;

transform:scale(.9);
opacity:0;

transition:.3s;

}

.page.active{

transform:scale(1);
opacity:1;

}

/* links */

.links{

margin-top:20px;

display:flex;
flex-direction:column;

gap:12px;

}

.link{

background:#1e293b;

padding:12px;

border-radius:12px;

text-decoration:none;

color:white;

display:flex;
gap:10px;

align-items:center;

}

.back{

margin-bottom:10px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="phone">

<div class="screen">

<!-- STATUS -->

<div class="status">

<div>17:21</div>

<div>
<i class="fa-solid fa-wifi"></i>
<i class="fa-solid fa-battery-full"></i>
</div>

</div>

<!-- PROFILE -->

<div class="profile">

<img src="https://i.pravatar.cc/150?img=12">

</div>

<!-- APPS -->

<div class="apps">

<div class="app" onclick="openPage('social')">
<div class="icon social"><i class="fa-solid fa-share-nodes"></i></div>
<p>Social</p>
</div>

<div class="app">
<div class="icon gallery"><i class="fa-solid fa-image"></i></div>
<p>Gallery</p>
</div>

<div class="app">
<div class="icon music"><i class="fa-solid fa-music"></i></div>
<p>Music</p>
</div>

<div class="app">
<div class="icon notes"><i class="fa-solid fa-note-sticky"></i></div>
<p>Notes</p>
</div>

<div class="app">
<div class="icon about"><i class="fa-solid fa-user"></i></div>
<p>About</p>
</div>

<div class="app">
<div class="icon settings"><i class="fa-solid fa-gear"></i></div>
<p>Settings</p>
</div>

</div>

<!-- DOCK -->

<div class="dock">

<div class="icon social"
onclick="openPage('social')">
<i class="fa-solid fa-share-nodes"></i>
</div>

<div class="icon about">
<i class="fa-solid fa-user"></i>
</div>

<div class="icon settings">
<i class="fa-solid fa-gear"></i>
</div>

</div>

<!-- SOCIAL PAGE -->

<div id="social" class="page">

<div class="back" onclick="closePage()">
← Back
</div>

<h3>My Socials</h3>

<div class="links">

<a class="link"
href="https://instagram.com/rpiidka">
<i class="fa-brands fa-instagram"></i>
Instagram
</a>

<a class="link"
href="https://tiktok.com/@irappp5">
<i class="fa-brands fa-tiktok"></i>
TikTok
</a>

<a class="link"
href="https://discord.com/users/rapiidka">
<i class="fa-brands fa-discord"></i>
Discord
</a>

<a class="link"
href="https://open.spotify.com">
<i class="fa-brands fa-spotify"></i>
Spotify
</a>

<a class="link"
href="https://youtube.com/@jebengg">
<i class="fa-brands fa-youtube"></i>
YouTube
</a>

<a class="link"
href="https://linkedin.com">
<i class="fa-brands fa-linkedin"></i>
LinkedIn
</a>

</div>

</div>

</div>

</div>

<script>

function openPage(id){

document.getElementById(id).classList.add("active")

}

function closePage(){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"))

}

</script>

</body>
</html>
