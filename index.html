<!DOCTYPE html>
<html>
<head>
<title>Rafi Links</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;
text-align:center;
overflow:hidden;

/* background gradient bergerak */
background:linear-gradient(-45deg,#0f172a,#1e3a8a,#2563eb,#38bdf8);
background-size:400% 400%;
animation:gradient 12s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
margin-top:80px;
}

.profile{
width:120px;
height:120px;
border-radius:50%;
border:4px solid white;
box-shadow:0 0 20px #38bdf8;
}

h1{
margin-top:15px;
font-size:28px;
}

p{
color:#dbeafe;
}

/* tombol sosmed */

.link{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
width:260px;
margin:15px auto;
padding:14px;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);

border-radius:12px;
text-decoration:none;
color:white;
font-weight:bold;

transition:0.3s;
}

.link img{
width:22px;
}

.link:hover{
transform:scale(1.07);
box-shadow:0 0 20px #38bdf8;
background:#38bdf8;
}

</style>

</head>

<body>

<div class="container">

<img class="profile" src="https://i.imgur.com/2DhmtJ4.png">

<h1>Rafi Dwi Kurniawan</h1>

</a>

GitHub

<a class="link" href="https://open.spotify.com">

Spotify

</div>

</body>
</html>
