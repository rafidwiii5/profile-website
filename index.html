<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Phone</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* PHONE FRAME */

.phone{
width:390px;
height:844px;
border-radius:50px;
overflow:hidden;
position:relative;
box-shadow:0 0 40px rgba(0,0,0,0.6);
background:black;
}

/* LOCKSCREEN */

.lockscreen{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") center/cover;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
padding:60px 20px;
animation:unlock 1.6s ease forwards;
}

.time{
font-size:72px;
font-weight:200;
margin-top:40px;
}

.date{
font-size:18px;
opacity:0.9;
}

/* swipe text */

.swipe{
font-size:14px;
opacity:0.8;
animation:swipeMove 1.5s infinite;
margin-bottom:40px;
}

@keyframes swipeMove{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

/* HOME SCREEN */

.home{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1519681393784-d120267933ba") center/cover;
display:flex;
flex-direction:column;
justify-content:space-between;
padding:60px 20px 40px;
opacity:0;
animation:homeAppear 1s ease forwards;
animation-delay:1.6s;
}

@keyframes unlock{
0%{transform:translateY(0)}
100%{transform:translateY(-100%)}
}

@keyframes homeAppear{
from{opacity:0}
to{opacity:1}
}

/* APP GRID */

.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:22px;
}

.app{
display:flex;
flex-direction:column;
align-items:center;
text-decoration:none;
color:white;
font-size:12px;
}

.icon{
width:60px;
height:60px;
border-radius:16px;
background:white;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.icon img{
width:100%;
height:100%;
object-fit:cover;
}

.label{
margin-top:6px;
}

/* dock */

.dock{
display:flex;
justify-content:space-around;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
padding:10px;
border-radius:24px;
}

.dock .icon{
width:58px;
height:58px;
}

</style>
</head>

<body>

<div class="phone">

<!-- LOCKSCREEN -->

<div class="lockscreen">

<div>
<div class="time">09:41</div>
<div class="date">Monday</div>
</div>

<div class="swipe">Swipe up to unlock</div>

</div>


<!-- HOME -->

<div class="home">

<div class="apps">

<a class="app" href="https://instagram.com">
<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</div>
<div class="label">Instagram</div>
</a>

<a class="app" href="https://tiktok.com">
<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
</div>
<div class="label">TikTok</div>
</a>

<a class="app" href="https://youtube.com">
<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</div>
<div class="label">YouTube</div>
</a>

<a class="app" href="https://linkedin.com">
<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/174/174857.png">
</div>
<div class="label">LinkedIn</div>
</a>

<a class="app" href="https://spotify.com">
<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
</div>
<div class="label">Spotify</div>
</a>

</div>


<div class="dock">

<a class="icon" href="https://instagram.com">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<a class="icon" href="https://youtube.com">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>

<a class="icon" href="https://spotify.com">
<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
</a>

<a class="icon" href="https://linkedin.com">
<img src="https://cdn-icons-png.flaticon.com/512/174/174857.png">
</a>

</div>

</div>

</div>

</body>
</html>
