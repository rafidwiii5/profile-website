<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rafi Links</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BACKGROUND */

body{

background:linear-gradient(135deg,#3a86ff,#74b9ff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

}

/* PHONE FRAME */

.phone{

width:360px;
height:700px;

background:linear-gradient(135deg,#3a86ff,#74b9ff);

border-radius:45px;

padding:40px 25px;

position:relative;

box-shadow:
0 0 0 12px #111,
0 25px 70px rgba(0,0,0,0.45);

overflow-y:auto;

}

/* NOTCH */

.phone::before{

content:"";

width:140px;
height:28px;

background:#111;

border-radius:30px;

position:absolute;

top:10px;
left:50%;

transform:translateX(-50%);

}

/* CONTAINER */

.container{

text-align:center;
color:white;

}

/* PROFILE */

.profile img{

width:130px;
height:130px;

border-radius:50%;
object-fit:cover;

border:5px solid white;

box-shadow:0 0 25px rgba(255,255,255,0.5);

margin-bottom:15px;

}

.profile h1{

font-size:24px;
margin-bottom:6px;

}

.tag{

opacity:0.9;
font-size:14px;
margin-bottom:30px;

}

/* LINK BUTTON */

.link{

display:flex;
align-items:center;
justify-content:center;

gap:12px;

width:100%;

margin:12px 0;

padding:14px;

background:white;

color:#333;

border-radius:16px;

text-decoration:none;

font-weight:bold;

font-size:15px;

transition:0.25s;

box-shadow:0 6px 15px rgba(0,0,0,0.2);

}

.link:hover{

transform:translateY(-3px) scale(1.03);
background:#eef5ff;

}

.link i{

font-size:20px;

}

/* SOCIAL ICON COLORS */

.instagram i{color:#E1306C;}
.tiktok i{color:#000;}
.discord i{color:#5865F2;}
.spotify i{color:#1DB954;}
.youtube i{color:#FF0000;}
.linkedin i{color:#0A66C2;}

/* FLOATING BACKGROUND */

.circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,0.15);

animation:float 14s linear infinite;

}

@keyframes float{

0%{
transform:translateY(110vh);
}

100%{
transform:translateY(-20vh);
}

}

/* RESPONSIVE */

@media (max-width:500px){

.phone{
width:95%;
height:auto;
border-radius:30px;
}

.profile img{
width:110px;
height:110px;
}

}

</style>

</head>

<body>


<div class="phone">

<div class="container">

<div class="profile">

<img src="foto.jpg.jpeg">

<h1>Rafi Dwi Kurniawan</h1>

<div class="tag">
Mahasiswa Teknik Industri<br>
Universitas Singaperbangsa Karawang
</div>

</div>

<a class="link instagram" href="https://instagram.com/rpiidka">
<i class="fa-brands fa-instagram"></i> Instagram
</a>

<a class="link tiktok" href="https://tiktok.com/@irappp5">
<i class="fa-brands fa-tiktok"></i> TikTok
</a>

<a class="link discord" href="https://discord.com/users/rapiidka">
<i class="fa-brands fa-discord"></i> Discord
</a>

<a class="link spotify" href="https://open.spotify.com/user/5i9h6e28bovq1grjbapj28vsh">
<i class="fa-brands fa-spotify"></i> Spotify
</a>

<a class="link youtube" href="https://youtube.com/@jebengg">
<i class="fa-brands fa-youtube"></i> YouTube
</a>

<a class="link linkedin" href="https://www.linkedin.com/in/rafi-dwi-kurniawan-4a3220189">
<i class="fa-brands fa-linkedin"></i> LinkedIn
</a>

</div>

</div>


<!-- FLOATING BACKGROUND -->

<div class="circle" style="width:45px;height:45px;left:8%;animation-duration:10s"></div>
<div class="circle" style="width:28px;height:28px;left:22%;animation-duration:8s"></div>
<div class="circle" style="width:35px;height:35px;left:40%;animation-duration:12s"></div>
<div class="circle" style="width:25px;height:25px;left:65%;animation-duration:9s"></div>
<div class="circle" style="width:50px;height:50px;left:85%;animation-duration:14s"></div>

</body>
</html>
