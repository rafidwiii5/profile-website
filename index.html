<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rafi Links</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#2b7fff,#6fb6ff);
overflow:hidden;
color:white;
}

/* container */

.container{
text-align:center;
z-index:2;
}

/* profile */

.profile img{
width:130px;
border-radius:50%;
border:4px solid white;
margin-bottom:15px;
}

.profile h1{
font-size:28px;
}

.tag{
opacity:0.85;
margin-bottom:25px;
}

/* buttons */

.link{
display:flex;
align-items:center;
justify-content:center;
gap:10px;

width:260px;
margin:10px auto;
padding:14px;

background:white;
color:#333;

border-radius:12px;
text-decoration:none;
font-weight:bold;

transition:0.3s;
}

.link:hover{
transform:scale(1.05);
background:#e9f3ff;
}

.link i{
font-size:18px;
}

/* floating bubbles */

.bubble{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.15);
animation:float 10s infinite linear;
}

@keyframes float{
0%{
transform:translateY(100vh);
}
100%{
transform:translateY(-20vh);
}
}

</style>
</head>

<body>

<div class="container">

<div class="profile">

<img src="https://i.imgur.com/yourphoto.png">

<h1>Rafi Dwi Kurniawan</h1>
<div class="tag">#anakbuahbjorka</div>

</div>

<a class="link" href="https://instagram.com/rpiidka">
<i class="fa-brands fa-instagram"></i> Instagram
</a>

<a class="link" href="https://tiktok.com/@irappp5">
<i class="fa-brands fa-tiktok"></i> TikTok
</a>

<a class="link" href="https://discord.com/users/rapiidka">
<i class="fa-brands fa-discord"></i> Discord
</a>

<a class="link" href="https://open.spotify.com/user/jebeng">
<i class="fa-brands fa-spotify"></i> Spotify
</a>

<a class="link" href="https://youtube.com/@Jebengg">
<i class="fa-brands fa-youtube"></i> YouTube
</a>

<a class="link" href="https://linkedin.com/in/USERNAME">
<i class="fa-brands fa-linkedin"></i> LinkedIn
</a>

</div>

<!-- animated bubbles -->

<div class="bubble" style="width:40px;height:40px;left:10%;animation-duration:12s"></div>
<div class="bubble" style="width:25px;height:25px;left:25%;animation-duration:9s"></div>
<div class="bubble" style="width:35px;height:35px;left:45%;animation-duration:14s"></div>
<div class="bubble" style="width:20px;height:20px;left:60%;animation-duration:8s"></div>
<div class="bubble" style="width:50px;height:50px;left:80%;animation-duration:13s"></div>

</body>
</html>
