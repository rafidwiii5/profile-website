<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rafi</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Inter', sans-serif;
}

/* background */

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background: radial-gradient(circle at top,#1f2937,#020617);

}

/* phone */

.phone{

width:320px;
height:640px;

background:#0f172a;

border-radius:35px;

padding:10px;

box-shadow:0 20px 60px rgba(0,0,0,0.7);

}

/* screen */

.screen{

width:100%;
height:100%;

border-radius:28px;

background:rgba(255,255,255,0.04);

backdrop-filter:blur(15px);

padding:20px;

overflow-y:auto;

}

/* profile */

.profile{

text-align:center;
margin-bottom:30px;

}

.profile img{

width:80px;
height:80px;

border-radius:50%;
margin-bottom:10px;

}

.profile h2{
font-size:18px;
color:white;
}

.profile p{

font-size:13px;
color:#9ca3af;

}

/* links */

.links{

display:flex;
flex-direction:column;
gap:12px;

}

.link{

display:flex;
align-items:center;
gap:12px;

padding:14px;

border-radius:14px;

background:rgba(255,255,255,0.05);

text-decoration:none;

color:white;

font-size:14px;

transition:0.2s;

}

.link:hover{

transform:scale(1.03);
background:rgba(255,255,255,0.09);

}

.link i{

font-size:18px;

}

</style>

</head>

<body>

<div class="phone">

<div class="screen">

<div class="profile">

<img src="https://i.pravatar.cc/150?img=3">

<h2>Rafi</h2>

<p>Developer • Creator</p>

</div>

<div class="links">

<a class="link" href="#">
<i class="fa-brands fa-instagram"></i>
Instagram
</a>

<a class="link" href="#">
<i class="fa-brands fa-tiktok"></i>
TikTok
</a>

<a class="link" href="#">
<i class="fa-brands fa-discord"></i>
Discord
</a>

<a class="link" href="#">
<i class="fa-brands fa-spotify"></i>
Spotify
</a>

<a class="link" href="#">
<i class="fa-brands fa-youtube"></i>
YouTube
</a>

</div>

</div>

</div>

</body>
</html>
