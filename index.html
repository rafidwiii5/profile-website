<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rafi Links</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:linear-gradient(-45deg,#9bbcff,#b7d1ff,#d6e4ff,#cfd9ff);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow-x:hidden;
color:white;

}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* container */

.container{

width:90%;
max-width:380px;
text-align:center;
padding:20px;
z-index:2;
animation:fadeUp 1s ease;

}

/* profile */

.profile img{

width:140px;
height:140px;
border-radius:50%;
object-fit:cover;

border:5px solid white;

box-shadow:0 0 35px rgba(255,255,255,0.6);

margin-bottom:15px;

transition:0.4s;

}

.profile img:hover{

transform:scale(1.07);
box-shadow:0 0 60px rgba(255,255,255,0.9);

}

.profile h1{

font-size:26px;
margin-bottom:5px;

}

.tag{

opacity:0.9;
margin-bottom:25px;
line-height:1.4;

}

/* about */

.about{

font-size:14px;
opacity:0.9;
margin-bottom:25px;

}

/* link buttons */

.link{

display:flex;
align-items:center;
justify-content:center;

gap:12px;

width:100%;

margin:12px 0;

padding:15px;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.3);

color:white;

border-radius:16px;

text-decoration:none;

font-weight:bold;

font-size:16px;

transition:0.25s;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

animation:fadeUp 0.8s ease;

}

.link:hover{

transform:translateY(-5px) scale(1.03);

background:rgba(255,255,255,0.25);

}

.link i{

font-size:20px;

}

/* social icon bar */

.social{

margin-top:20px;

}

.social i{

font-size:20px;

margin:0 10px;

cursor:pointer;

transition:0.3s;

}

.social i:hover{

transform:scale(1.4);

}

/* social colors */

.instagram i{color:#E1306C;}
.tiktok i{color:#000;}
.discord i{color:#5865F2;}
.spotify i{color:#1DB954;}
.youtube i{color:#FF0000;}
.linkedin i{color:#0A66C2;}

/* visitor */

.visitor{

margin-top:15px;
font-size:13px;
opacity:0.8;

}

/* floating animation */

.circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,0.15);

animation:float 12s linear infinite;

}

@keyframes float{

0%{
transform:translateY(100vh);
}

100%{
transform:translateY(-20vh);
}

}

/* animation */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* responsive */

@media (max-width:500px){

.profile img{
width:120px;
height:120px;
}

}

</style>

</head>

<body>


<div class="container">

<div class="profile">

<img src="foto.jpg">

<h1>Rafi Dwi Kurniawan</h1>

<div class="tag">
Mahasiswa Teknik Industri<br>
Universitas Singaperbangsa Karawang
</div>

</div>

<div class="about">
Hi! I'm Rafi 👋<br>
I like tech, design, and building digital projects.
</div>


<a class="link instagram" href="https://instagram.com/rpiidka">
<i class="fa-brands fa-instagram"></i> Instagram
</a>

<a class="link tiktok" href="https://tiktok.com/@irappp5">
<i class="fa-brands fa-tiktok"></i> TikTok
</a>

<a class="link discord" href="https://discord.com/users/rapiidka">
<i class="fa-brands fa-discord"></i> Discord
</a>

<a class="link spotify" href="https://open.spotify.com/user/5i9h6e28bovq1grjbapj28vsh">
<i class="fa-brands fa-spotify"></i> Spotify
</a>

<a class="link youtube" href="https://youtube.com/@jebengg">
<i class="fa-brands fa-youtube"></i> YouTube
</a>

<a class="link linkedin" href="https://www.linkedin.com/in/rafi-dwi-kurniawan-4a3220189/">
<i class="fa-brands fa-linkedin"></i> LinkedIn
</a>


<div class="social">

<i class="fa-brands fa-instagram"></i>
<i class="fa-brands fa-tiktok"></i>
<i class="fa-brands fa-discord"></i>
<i class="fa-brands fa-spotify"></i>

</div>

<div class="visitor">

👀 Visitor: <span id="count">0</span>

</div>

</div>


<!-- floating background -->

<div class="circle" style="width:40px;height:40px;left:10%;animation-duration:9s"></div>
<div class="circle" style="width:25px;height:25px;left:25%;animation-duration:7s"></div>
<div class="circle" style="width:35px;height:35px;left:45%;animation-duration:11s"></div>
<div class="circle" style="width:20px;height:20px;left:60%;animation-duration:8s"></div>
<div class="circle" style="width:50px;height:50px;left:80%;animation-duration:12s"></div>
<div class="circle" style="width:30px;height:30px;left:15%;animation-duration:10s"></div>
<div class="circle" style="width:45px;height:45px;left:70%;animation-duration:14s"></div>


<script>

/* visitor counter */

let count = localStorage.getItem("visits")

if(count == null){
count = 1
}else{
count++
}

localStorage.setItem("visits",count)

document.getElementById("count").innerText = count

</script>

</body>
</html>
