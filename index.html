<!DOCTYPE html>
<html>
<head>
<title>Rafi Links</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;
text-align:center;
overflow:hidden;

background:linear-gradient(-45deg,#0f172a,#1e3a8a,#2563eb,#38bdf8);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* particles */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{
margin-top:80px;
}

.profile{
width:120px;
height:120px;
border-radius:50%;
border:4px solid white;
box-shadow:0 0 20px #38bdf8;
}

/* typing effect */

.typing{
font-size:28px;
font-weight:bold;
border-right:3px solid white;
display:inline-block;
padding-right:5px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{border-color:white;}
50%{border-color:transparent;}
100%{border-color:white;}
}

p{
color:#dbeafe;
}

/* buttons */

.link{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
width:260px;
margin:15px auto;
padding:14px;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);

border-radius:12px;
text-decoration:none;
color:white;
font-weight:bold;

transition:0.3s;
}

.link img{
width:22px;
}

.link:hover{
transform:scale(1.07);
box-shadow:0 0 20px #38bdf8;
background:#38bdf8;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<img class="profile" src="https://i.imgur.com/2DhmtJ4.png">

<h1 class="typing" id="name"></h1>

<p>Mahasiswa Teknik Industri UNSIKA</p>

<a class="link" href="https://instagram.com/username">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
Instagram
</a>

<a class="link" href="https://tiktok.com/@username">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
TikTok
</a>

<a class="link" href="https://github.com/rafidwiii5">
<img src="https://cdn-icons-png.flaticon.com/512/733/733553.png">
GitHub
</a>

<a class="link" href="https://open.spotify.com">
<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
Spotify
</a>

<a class="link" href="#">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
Discord
</a>

</div>

<script>

/* typing animation */

const text="Rafi Dwi Kurniawan";
let i=0;

function type(){
if(i<text.length){
document.getElementById("name").innerHTML+=text.charAt(i);
i++;
setTimeout(type,80);
}
}

type();

/* particles */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()*1
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(255,255,255,0.5)";

for(let i=0;i<particles.length;i++){
let p=particles[i];
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
ctx.fill();

p.y+=p.d;

if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}

}

requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
