<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phone UI</title>

<style>

body{
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:sans-serif;
}

.phone{
width:320px;
height:660px;
border-radius:45px;
border:12px solid black;
overflow:hidden;
position:relative;
}

/* LOCKSCREEN */

#lockscreen{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1614850715649-1d0106293bd1") center/cover;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
color:white;
transition:0.8s;
}

.time{
font-size:70px;
margin-top:90px;
}

.bar{
width:120px;
height:5px;
background:white;
border-radius:5px;
margin-bottom:40px;
}

/* HOME */

#home{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1614850715649-1d0106293bd1") center/cover;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
padding:110px 18px;
opacity:0;
transition:0.8s;
}

.app{
text-align:center;
color:white;
font-size:12px;
}

.app img{
width:60px;
border-radius:18px;
}

/* ANIMATION */

.unlock #lockscreen{
transform:translateY(-100%);
}

.unlock #home{
opacity:1;
}

</style>
</head>

<body>

<div class="phone" id="phone">

<div id="lockscreen">
<div class="time">09:41</div>
<div class="bar"></div>
</div>

<div id="home">

<div class="app">
<a href="https://instagram.com/USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>
<p>Instagram</p>
</div>

<div class="app">
<a href="https://tiktok.com/@USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
</a>
<p>TikTok</p>
</div>

<div class="app">
<a href="https://youtube.com/@USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>
<p>YouTube</p>
</div>

<div class="app">
<a href="https://linkedin.com/in/USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/145/145807.png">
</a>
<p>LinkedIn</p>
</div>

<div class="app">
<a href="https://open.spotify.com/user/USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
</a>
<p>Spotify</p>
</div>

</div>

</div>

<script>

setTimeout(()=>{
document.getElementById("phone").classList.add("unlock")
},2000)

</script>

</body>
</html>
