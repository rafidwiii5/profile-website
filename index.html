<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* SCALE */

.phoneWrap{
transform:scale(.8);
}

@media (max-width:600px){
.phoneWrap{transform:scale(1);}
}

/* PHONE */

.phone{
width:360px;
height:780px;
border-radius:50px;
overflow:hidden;
position:relative;
box-shadow:0 40px 90px rgba(0,0,0,0.8);
}

/* WALLPAPER */

.wallpaper{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1519608487953-e999c86e7455") center/cover;
}

/* STATUS */

.status{
position:absolute;
top:14px;
left:24px;
right:24px;
display:flex;
justify-content:space-between;
color:white;
font-size:14px;
z-index:10;
}

/* ISLAND */

.island{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
width:120px;
height:30px;
background:black;
border-radius:20px;
}

/* LOCKSCREEN */

.lockscreen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
transition:1s;
}

.time{
font-size:64px;
font-weight:600;
margin-top:100px;
}

/* SWIPE INDICATOR */

.swipeArea{
position:absolute;
bottom:50px;
display:flex;
flex-direction:column;
align-items:center;
font-size:13px;
opacity:.9;
}

.arrow{
font-size:24px;
animation:swipeUp 1.2s infinite;
}

@keyframes swipeUp{
0%{transform:translateY(10px);opacity:.4}
50%{transform:translateY(-10px);opacity:1}
100%{transform:translateY(10px);opacity:.4}
}

/* HOME */

.home{
position:absolute;
width:100%;
height:100%;
padding:120px 32px;
box-sizing:border-box;
display:none;
}

.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:22px;
}

.app{
text-align:center;
color:white;
font-size:11px;
}

.icon{
width:54px;
height:54px;
border-radius:16px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.25);
}

.icon img{
width:28px;
height:28px;
}

/* DOCK */

.dock{
position:absolute;
bottom:28px;
left:50%;
transform:translateX(-50%);
width:86%;
height:68px;
border-radius:24px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
display:flex;
justify-content:center;
align-items:center;
gap:26px;
}

/* HOME BAR */

.homebar{
position:absolute;
bottom:8px;
left:50%;
transform:translateX(-50%);
width:120px;
height:5px;
background:white;
border-radius:10px;
}

</style>

<script>

function updateTime(){
let now=new Date()
let h=now.getHours().toString().padStart(2,"0")
let m=now.getMinutes().toString().padStart(2,"0")

document.getElementById("time").innerText=h+":"+m
document.getElementById("timeSmall").innerText=h+":"+m
}

setInterval(updateTime,1000)
updateTime()

/* AUTO SWIPE ANIMATION */

setTimeout(()=>{

let lock=document.getElementById("lock")
let home=document.getElementById("home")

lock.style.transform="translateY(-100%)"

setTimeout(()=>{
lock.style.display="none"
home.style.display="block"
},800)

},2500)

</script>
