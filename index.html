<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rafi Phone</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:#0f172a;

}

/* phone */

.phone{

width:320px;
height:640px;

background:#020617;

border-radius:35px;

padding:10px;

box-shadow:0 20px 60px rgba(0,0,0,0.6);

}

/* screen */

.screen{

width:100%;
height:100%;

border-radius:28px;

background:linear-gradient(#1e293b,#020617);

padding:20px;

color:white;

}

/* home */

.apps{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-top:30px;

}

.app{

text-align:center;
cursor:pointer;

}

.icon{

width:60px;
height:60px;

background:rgba(255,255,255,0.1);

border-radius:18px;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;

margin:auto;
margin-bottom:6px;

}

/* social page */

.links{

display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;

}

.link{

background:rgba(255,255,255,0.08);

padding:12px;

border-radius:12px;

text-decoration:none;

color:white;

display:flex;
align-items:center;
gap:10px;

}

.back{

cursor:pointer;
margin-bottom:10px;

color:#94a3b8;

}

/* hidden */

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="phone">

<div class="screen">

<!-- HOME -->

<div id="home-screen">

<h3>Rafi Phone</h3>

<div class="apps">

<div class="app" onclick="openSocial()">
<div class="icon"><i class="fa-solid fa-share-nodes"></i></div>
<p>Social</p>
</div>

</div>

</div>

<!-- SOCIAL PAGE -->

<div id="social-screen" class="hidden">

<div class="back" onclick="goHome()">
← Back
</div>

<h3>My Socials</h3>

<div class="links">

<a class="link"
href="https://instagram.com/rpiidka">
<i class="fa-brands fa-instagram"></i>
Instagram
</a>

<a class="link"
href="https://tiktok.com/@irappp5">
<i class="fa-brands fa-tiktok"></i>
TikTok
</a>

<a class="link"
href="https://discord.com/users/rapiidka">
<i class="fa-brands fa-discord"></i>
Discord
</a>

<a class="link"
href="https://open.spotify.com">
<i class="fa-brands fa-spotify"></i>
Spotify
</a>

<a class="link"
href="https://youtube.com/@jebengg">
<i class="fa-brands fa-youtube"></i>
YouTube
</a>

<a class="link"
href="https://linkedin.com">
<i class="fa-brands fa-linkedin"></i>
LinkedIn
</a>

</div>

</div>

</div>

</div>

<script>

function openSocial(){

document.getElementById("home-screen").classList.add("hidden")
document.getElementById("social-screen").classList.remove("hidden")

}

function goHome(){

document.getElementById("home-screen").classList.remove("hidden")
document.getElementById("social-screen").classList.add("hidden")

}

</script>

</body>
</html>
