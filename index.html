<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Phone</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.phone{
  width:320px;
  height:650px;
  border-radius:40px;
  border:10px solid black;
  overflow:hidden;
  position:relative;
  background:black;
}

/* LOCK SCREEN */

#lockscreen{
  position:absolute;
  width:100%;
  height:100%;
  background:url("https://images.unsplash.com/photo-1607789503313-3d96a3e2c9c4") center/cover;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  color:white;
  transition:0.5s;
}

.time{
  margin-top:80px;
  font-size:60px;
}

.swipe{
  margin-bottom:40px;
  font-size:14px;
  opacity:0.8;
}

/* HOME SCREEN */

#home{
  position:absolute;
  width:100%;
  height:100%;
  background:url("https://images.unsplash.com/photo-1607789503313-3d96a3e2c9c4") center/cover;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  padding:100px 20px;
  opacity:0;
  transition:0.5s;
}

.app{
  text-align:center;
  color:white;
  font-size:12px;
}

.app img{
  width:60px;
  border-radius:15px;
  cursor:pointer;
}

/* active */

.unlock #lockscreen{
  transform:translateY(-100%);
}

.unlock #home{
  opacity:1;
}
</style>
</head>

<body>

<div class="phone" id="phone">

<div id="lockscreen">
<div class="time">09:41</div>
<div class="swipe">Swipe up to unlock</div>
</div>

<div id="home">

<div class="app">
<a href="https://instagram.com/USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>
<p>Instagram</p>
</div>

<div class="app">
<a href="https://tiktok.com/@USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
</a>
<p>TikTok</p>
</div>

<div class="app">
<a href="https://youtube.com/@USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>
<p>YouTube</p>
</div>

<div class="app">
<a href="https://linkedin.com/in/USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/145/145807.png">
</a>
<p>LinkedIn</p>
</div>

<div class="app">
<a href="https://open.spotify.com/user/USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
</a>
<p>Spotify</p>
</div>

</div>
</div>

<script>
let phone = document.getElementById("phone")

document.getElementById("lockscreen").addEventListener("click",()=>{
phone.classList.add("unlock")
})
</script>

</body>
</html>
