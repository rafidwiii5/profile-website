```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iPhone Social Hub</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:-apple-system,BlinkMacSystemFont;
}

.phone{
width:330px;
height:680px;
border-radius:45px;
overflow:hidden;
position:relative;
box-shadow:0 30px 80px rgba(0,0,0,0.9);
}

.wallpaper{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1519608487953-e999c86e7455") center/cover;
}

/* STATUS BAR */

.status{
position:absolute;
top:12px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
color:white;
font-size:14px;
font-weight:500;
z-index:5;
}

.rightStatus{
display:flex;
gap:6px;
align-items:center;
}

/* DYNAMIC ISLAND */

.island{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:120px;
height:28px;
background:black;
border-radius:20px;
z-index:4;
}

/* LOCKSCREEN */

.lockscreen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.time{
font-size:64px;
font-weight:600;
margin-top:80px;
}

.swipe{
position:absolute;
bottom:40px;
font-size:14px;
opacity:.8;
}

/* HOME */

.home{
position:absolute;
width:100%;
height:100%;
padding:110px 25px;
box-sizing:border-box;
display:none;
}

.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:24px;
}

.app{
text-align:center;
color:white;
font-size:12px;
}

.icon{
width:64px;
height:64px;
border-radius:18px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
box-shadow:0 6px 16px rgba(0,0,0,0.5);
}

/* APP COLORS */

.ig{background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af)}
.tt{background:black}
.yt{background:#ff0000}
.li{background:#0077b5}
.sp{background:#1db954}

/* DOCK */

.dock{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
width:85%;
height:80px;
border-radius:30px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(25px);
display:flex;
justify-content:center;
align-items:center;
gap:30px;
}

/* HOME BAR */

.homebar{
position:absolute;
bottom:8px;
left:50%;
transform:translateX(-50%);
width:120px;
height:5px;
background:white;
border-radius:10px;
opacity:.8;
}

</style>
</head>

<body>

<div class="phone">

<div class="wallpaper"></div>

<div class="status">
<div id="timeSmall">9:41</div>

<div class="rightStatus">
<span>📶</span>
<span>📡</span>
<span>🔋</span>
</div>
</div>

<div class="island"></div>

<div class="lockscreen" id="lock">

<div class="time" id="time">9:41</div>

<div class="swipe">Swipe up to unlock</div>

</div>

<div class="home" id="home">

<div class="apps">

<div class="app">
<a href="https://instagram.com" target="_blank">
<div class="icon ig">📸</div>
</a>
Instagram
</div>

<div class="app">
<a href="https://tiktok.com" target="_blank">
<div class="icon tt">🎵</div>
</a>
TikTok
</div>

<div class="app">
<a href="https://youtube.com" target="_blank">
<div class="icon yt">▶</div>
</a>
YouTube
</div>

<div class="app">
<a href="https://linkedin.com" target="_blank">
<div class="icon li">in</div>
</a>
LinkedIn
</div>

<div class="app">
<a href="https://spotify.com" target="_blank">
<div class="icon sp">♫</div>
</a>
Spotify
</div>

</div>

<div class="dock">

<a href="https://instagram.com" target="_blank">
<div class="icon ig">📸</div>
</a>

<a href="https://tiktok.com" target="_blank">
<div class="icon tt">🎵</div>
</a>

<a href="https://youtube.com" target="_blank">
<div class="icon yt">▶</div>
</a>

</div>

</div>

<div class="homebar"></div>

</div>

<script>

function updateTime(){

let now=new Date()
let h=now.getHours().toString().padStart(2,"0")
let m=now.getMinutes().toString().padStart(2,"0")

document.getElementById("time").innerText=h+":"+m
document.getElementById("timeSmall").innerText=h+":"+m

}

setInterval(updateTime,1000)
updateTime()

setTimeout(()=>{

let lock=document.getElementById("lock")
let home=document.getElementById("home")

lock.style.transition="1s"
lock.style.transform="translateY(-100%)"

setTimeout(()=>{
lock.style.display="none"
home.style.display="block"
},800)

},2000)

</script>

</body>
</html>
```
