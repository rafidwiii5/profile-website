<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone UI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Inter", sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

/* PHONE FRAME */

.phone{
width:360px;
height:740px;
border-radius:40px;
overflow:hidden;
position:relative;
box-shadow:0 30px 60px rgba(0,0,0,0.6);
}

/* WALLPAPER */

.wallpaper{
position:absolute;
width:100%;
height:100%;
background-image:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80");
background-size:cover;
background-position:center;
}

/* LOCKSCREEN */

.lockscreen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:80px;
color:white;
transition:0.6s;
}

/* TIME */

.time{
font-size:70px;
font-weight:300;
letter-spacing:2px;
}

.date{
margin-top:5px;
font-size:16px;
opacity:0.8;
}

/* NOTIFICATION */

.notification{
margin-top:30px;
width:85%;
padding:12px 15px;
border-radius:15px;
background:rgba(255,255,255,0.15);
backdrop-filter: blur(10px);
font-size:14px;
}

/* SWIPE TEXT */

.swipe{
position:absolute;
bottom:40px;
font-size:14px;
opacity:0.8;
animation: swipe 2s infinite;
}

@keyframes swipe{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* HOME SCREEN */

.home{
position:absolute;
width:100%;
height:100%;
padding:60px 25px;
display:grid;
grid-template-columns:repeat(4,1fr);
grid-gap:25px;
opacity:0;
transform:translateY(100%);
transition:0.6s;
}

/* APP ICON */

.app{
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-size:11px;
}

.app img{
width:50px;
height:50px;
border-radius:14px;
margin-bottom:5px;
}

/* DOCK */

.dock{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:85%;
height:70px;
border-radius:25px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
align-items:center;
}

.dock img{
width:55px;
height:55px;
border-radius:16px;
}

/* ACTIVE */

.phone.active .lockscreen{
transform:translateY(-100%);
opacity:0;
}

.phone.active .home{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<div class="phone" id="phone">

<div class="wallpaper"></div>

<!-- LOCKSCREEN -->

<div class="lockscreen" id="lock">

<div class="time" id="clock">12:00</div>
<div class="date">Monday, June 10</div>

<div class="notification">
📩 New Message<br>
<i>"Bro jangan lupa tugas besok"</i>
</div>

<div class="notification">
🔔 Instagram<br>
<i>@someone liked your photo</i>
</div>

<div class="swipe">
⬆ Swipe Up to Unlock
</div>

</div>

<!-- HOME SCREEN -->

<div class="home">

<div class="app">
<img src="https://img.icons8.com/color/96/safari--v1.png">
Safari
</div>

<div class="app">
<img src="https://img.icons8.com/color/96/instagram-new.png">
Instagram
</div>

<div class="app">
<img src="https://img.icons8.com/color/96/youtube-play.png">
YouTube
</div>

<div class="app">
<img src="https://img.icons8.com/color/96/tiktok.png">
TikTok
</div>

<div class="app">
<img src="https://img.icons8.com/color/96/spotify.png">
Spotify
</div>

<div class="app">
<img src="https://img.icons8.com/color/96/whatsapp.png">
WhatsApp
</div>

<div class="app">
<img src="https://img.icons8.com/color/96/gmail.png">
Mail
</div>

<div class="app">
<img src="https://img.icons8.com/color/96/google-maps.png">
Maps
</div>

</div>

<!-- DOCK -->

<div class="dock">

<img src="https://img.icons8.com/color/96/phone.png">
<img src="https://img.icons8.com/color/96/safari--v1.png">
<img src="https://img.icons8.com/color/96/imessage.png">
<img src="https://img.icons8.com/color/96/apple-music.png">

</div>

</div>

<script>

/* CLOCK */

function updateClock(){
let now = new Date();
let h = now.getHours().toString().padStart(2,'0');
let m = now.getMinutes().toString().padStart(2,'0');

document.getElementById("clock").innerText = h+":"+m;
}

setInterval(updateClock,1000);
updateClock();

/* SWIPE */

let startY = 0;

document.addEventListener("touchstart",e=>{
startY = e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
let endY = e.changedTouches[0].clientY;

if(startY - endY > 80){
document.getElementById("phone").classList.add("active");
}
});

</script>

</body>
</html>
