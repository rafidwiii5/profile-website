<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone UI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont;
}

body{
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* PHONE */

.phone{
width:390px;
height:844px;
border-radius:55px;
overflow:hidden;
position:relative;
background:black;
box-shadow:0 40px 80px rgba(0,0,0,0.6);
}

/* STATUS BAR */

.status{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
color:white;
font-size:14px;
z-index:5;
}

/* LOCKSCREEN */

.lock{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1519125323398-675f0ddb6308") center/cover;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
padding:120px 20px 60px;
color:white;
transition:0.7s;
}

.time{
font-size:80px;
font-weight:200;
}

.date{
font-size:18px;
opacity:.9;
}

.notif{
width:85%;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(20px);
padding:12px;
border-radius:16px;
margin-top:20px;
font-size:14px;
}

.swipe{
opacity:.8;
animation:swipe 1.5s infinite;
}

@keyframes swipe{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* HOME */

.home{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1491553895911-0055eca6402d") center/cover;
padding:120px 25px 40px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:22px;
opacity:0;
transition:0.7s;
}

/* APP */

.app{
text-align:center;
color:white;
font-size:12px;
}

.icon{
width:62px;
height:62px;
margin:auto;
border-radius:18px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

.icon img{
width:100%;
}

/* DOCK */

.dock{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:85%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(25px);
border-radius:28px;
padding:12px;
display:flex;
justify-content:space-around;
}

.dock img{
width:60px;
border-radius:16px;
}

/* UNLOCK */

.phone.unlock .lock{
transform:translateY(-100%);
opacity:0;
}

.phone.unlock .home{
opacity:1;
}

</style>
</head>

<body>

<div class="phone" id="phone">

<div class="status">
<div>9:41</div>
<div>📶 📡 🔋</div>
</div>

<!-- LOCKSCREEN -->

<div class="lock">

<div>
<div class="time">9:41</div>
<div class="date">Monday</div>

<div class="notif">
📩 Instagram <br>
someone sent you a message
</div>

<div class="notif">
🔔 TikTok <br>
3 new notifications
</div>

</div>

<div class="swipe">⬆ swipe up</div>

</div>

<!-- HOME -->

<div class="home">

<div class="app">
<div class="icon"><img src="https://img.icons8.com/color/96/instagram-new.png"></div>
Instagram
</div>

<div class="app">
<div class="icon"><img src="https://img.icons8.com/color/96/tiktok.png"></div>
TikTok
</div>

<div class="app">
<div class="icon"><img src="https://img.icons8.com/color/96/youtube-play.png"></div>
YouTube
</div>

<div class="app">
<div class="icon"><img src="https://img.icons8.com/color/96/spotify.png"></div>
Spotify
</div>

<div class="app">
<div class="icon"><img src="https://img.icons8.com/color/96/safari--v1.png"></div>
Safari
</div>

<div class="app">
<div class="icon"><img src="https://img.icons8.com/color/96/google-maps.png"></div>
Maps
</div>

</div>

<div class="dock">

<img src="https://img.icons8.com/color/96/phone.png">
<img src="https://img.icons8.com/color/96/safari--v1.png">
<img src="https://img.icons8.com/color/96/imessage.png">
<img src="https://img.icons8.com/color/96/apple-music.png">

</div>

</div>

<script>

let startY=0

document.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY
})

document.addEventListener("touchend",e=>{
let endY=e.changedTouches[0].clientY

if(startY-endY>70){
document.getElementById("phone").classList.add("unlock")
}
})

</script>

</body>
</html>
