<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iPhone Social Hub</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:-apple-system,BlinkMacSystemFont;
}

.phone{
width:320px;
height:640px;
border-radius:40px;
overflow:hidden;
position:relative;
box-shadow:0 0 40px rgba(0,0,0,0.7);
}

.wallpaper{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover;
}

/* LOCKSCREEN */

.lockscreen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
padding:60px 0;
color:white;
animation:lockIntro 1s ease;
}

@keyframes lockIntro{
from{opacity:0; transform:scale(1.1)}
to{opacity:1; transform:scale(1)}
}

.time{
font-size:60px;
font-weight:600;
}

.swipe{
font-size:14px;
opacity:.8;
animation:swipeHint 1.5s infinite;
}

@keyframes swipeHint{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

/* HOME */

.home{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover;
padding:30px 20px;
box-sizing:border-box;
opacity:0;
}

.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:40px;
}

.app{
text-align:center;
color:white;
font-size:12px;
}

.icon{
width:60px;
height:60px;
border-radius:18px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
box-shadow:0 5px 12px rgba(0,0,0,0.4);
}

/* ICON COLORS */

.ig{background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af)}
.tt{background:black}
.yt{background:#ff0000}
.li{background:#0077b5}
.sp{background:#1db954}

/* DOCK */

.dock{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:85%;
height:70px;
border-radius:25px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(20px);
display:flex;
justify-content:center;
align-items:center;
gap:25px;
}

</style>
</head>

<body>

<div class="phone">

<div class="wallpaper"></div>

<div class="lockscreen" id="lock">

<div class="time" id="time">12:00</div>

<div class="swipe">Swipe up to unlock</div>

</div>

<div class="home" id="home">

<div class="apps">

<div class="app">
<a href="https://instagram.com" target="_blank">
<div class="icon ig">📸</div>
</a>
Instagram
</div>

<div class="app">
<a href="https://tiktok.com" target="_blank">
<div class="icon tt">🎵</div>
</a>
TikTok
</div>

<div class="app">
<a href="https://youtube.com" target="_blank">
<div class="icon yt">▶</div>
</a>
YouTube
</div>

<div class="app">
<a href="https://linkedin.com" target="_blank">
<div class="icon li">in</div>
</a>
LinkedIn
</div>

<div class="app">
<a href="https://spotify.com" target="_blank">
<div class="icon sp">♫</div>
</a>
Spotify
</div>

</div>

<div class="dock">

<a href="https://instagram.com" target="_blank">
<div class="icon ig">📸</div>
</a>

<a href="https://tiktok.com" target="_blank">
<div class="icon tt">🎵</div>
</a>

<a href="https://youtube.com" target="_blank">
<div class="icon yt">▶</div>
</a>

</div>

</div>

</div>

<script>

/* CLOCK */

function updateTime(){
let now=new Date()
let h=now.getHours().toString().padStart(2,"0")
let m=now.getMinutes().toString().padStart(2,"0")
document.getElementById("time").innerText=h+":"+m
}
setInterval(updateTime,1000)
updateTime()

/* AUTO UNLOCK ANIMATION */

setTimeout(()=>{

let lock=document.getElementById("lock")
let home=document.getElementById("home")

lock.style.transition="1s"
lock.style.transform="translateY(-100%)"

setTimeout(()=>{
lock.style.display="none"
home.style.transition="1s"
home.style.opacity="1"
},800)

},2000)

</script>

</body>
</html>
