<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* SCALE */

.phoneWrap{
transform:scale(.75);
}

@media (max-width:600px){
.phoneWrap{
transform:scale(1);
}
}

/* PHONE */

.phone{
width:360px;
height:780px;
border-radius:50px;
overflow:hidden;
position:relative;
box-shadow:0 40px 90px rgba(0,0,0,0.8);
}

/* WALLPAPER */

.wallpaper{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1519608487953-e999c86e7455") center/cover;
filter:brightness(.9);
}

/* STATUS BAR */

.status{
position:absolute;
top:14px;
left:24px;
right:24px;
display:flex;
justify-content:space-between;
color:white;
font-size:14px;
z-index:10;
}

/* ISLAND */

.island{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
width:120px;
height:30px;
background:black;
border-radius:20px;
}

/* LOCKSCREEN */

.lockscreen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
}

.time{
font-size:64px;
font-weight:600;
margin-top:100px;
}

.swipe{
position:absolute;
bottom:50px;
font-size:13px;
opacity:.8;
}

/* HOME */

.home{
position:absolute;
width:100%;
height:100%;
padding:120px 32px;
box-sizing:border-box;
display:none;
}

.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:22px;
}

.app{
text-align:center;
color:white;
font-size:11px;
}

/* ICON */

.icon{
width:54px;
height:54px;
border-radius:16px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.25);
}

.icon img{
width:28px;
height:28px;
}

/* DOCK */

.dock{
position:absolute;
bottom:28px;
left:50%;
transform:translateX(-50%);
width:86%;
height:68px;
border-radius:24px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
display:flex;
justify-content:center;
align-items:center;
gap:26px;
}

/* HOME BAR */

.homebar{
position:absolute;
bottom:8px;
left:50%;
transform:translateX(-50%);
width:120px;
height:5px;
background:white;
border-radius:10px;
}

</style>
</head>
