<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rafi Links</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:linear-gradient(135deg,#3a86ff,#74b9ff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow-x:hidden;
color:white;

}

/* PHONE FRAME */

.phone{

width:360px;
height:680px;

background:linear-gradient(135deg,#3a86ff,#74b9ff);

border-radius:40px;

padding:30px 20px;

box-shadow:
0 0 0 10px #111,
0 20px 60px rgba(0,0,0,0.4);

position:relative;

overflow-y:auto;

}

/* notch */

.phone::before{

content:"";

width:120px;
height:25px;

background:#111;

border-radius:20px;

position:absolute;

top:10px;
left:50%;

transform:translateX(-50%);

}

/* container */

.container{

width:100%;
max-width:380px;
text-align:center;
padding-top:20px;
z-index:2;

}

/* profile */

.profile img{

width:140px;
height:140px;
border-radius:50%;
object-fit:cover;

border:5px solid white;

box-shadow:0 0 25px rgba(255,255,255,0.5);

margin-bottom:15px;

}

.profile h1{

font-size:26px;
margin-bottom:5px;

}

.tag{

opacity:0.9;
margin-bottom:25px;

}

/* link buttons */

.link{

display:flex;
align-items:center;
justify-content:center;

gap:12px;

width:100%;

margin:10px 0;

padding:14px;

background:white;

color:#333;

border-radius:14px;

text-decoration:none;

font-weight:bold;

font-size:16px;

transition:0.25s;

box-shadow:0 6px 15px rgba(0,0,0,0.15);

}

.link:hover{

transform:scale(1.05);
background:#eef5ff;

}

.link i{

font-size:20px;

}

/* social colors */

.instagram i{color:#E1306C;}
.tiktok i{color:#000;}
.discord i{color:#5865F2;}
.spotify i{color:#1DB954;}
.youtube i{color:#FF0000;}
.linkedin i{color:#0A66C2;}

/* floating animation */

.circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,0.15);

animation:float 12s linear infinite;

}

@keyframes float{

0%{
transform:translateY(100vh);
}

100%{
transform:translateY(-20vh);
}

}

/* responsive */

@media (max-width:500px){

.phone{
width:95%;
height:auto;
}

.profile img{
width:120px;
height:120px;
}

}

</style>

</head>

<body>


<div class="phone">

<div class="container">

<div class="profile">

<img src="foto.jpg.jpeg">

<h1>Rafi Dwi Kurniawan</h1>

<div class="tag">Mahasiswa Teknik Industri 
Universitas Singaperbangsa Karawang</div>

</div>


<a class="link instagram" href="https://instagram.com/rpiidka">
<i class="fa-brands fa-instagram"></i> Instagram
</a>

<a class="link tiktok" href="https://tiktok.com/@irappp5">
<i class="fa-brands fa-tiktok"></i> TikTok
</a>

<a class="link discord" href="https://discord.com/users/rapiidka">
<i class="fa-brands fa-discord"></i> Discord
</a>

<a class="link spotify" href="https://open.spotify.com/user/5i9h6e28bovq1grjbapj28vsh?si=2EcfGSezQmi3PEfxDhzZ3A">
<i class="fa-brands fa-spotify"></i> Spotify
</a>

<a class="link youtube" href="https://youtube.com/@jebengg?si=RlSLf_RLGaXWJTGy">
<i class="fa-brands fa-youtube"></i> YouTube
</a>

<a class="link linkedin" href="https://www.linkedin.com/in/rafi-dwi-kurniawan-4a3220189/">
<i class="fa-brands fa-linkedin"></i> LinkedIn
</a>

</div>

</div>


<!-- floating background -->

<div class="circle" style="width:40px;height:40px;left:10%;animation-duration:9s"></div>
<div class="circle" style="width:25px;height:25px;left:25%;animation-duration:7s"></div>
<div class="circle" style="width:35px;height:35px;left:45%;animation-duration:11s"></div>
<div class="circle" style="width:20px;height:20px;left:60%;animation-duration:8s"></div>
<div class="circle" style="width:50px;height:50px;left:80%;animation-duration:12s"></div>

</body>
</html>
