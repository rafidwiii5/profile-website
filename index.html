<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rafi Links</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#2b7fff,#7cc4ff);
overflow:hidden;
color:white;
}

/* container */

.container{
text-align:center;
z-index:2;
width:320px;
}

/* profile photo */

.profile img{
width:170px;
height:170px;
object-fit:cover;
border-radius:50%;
border:5px solid white;
box-shadow:0 0 25px rgba(255,255,255,0.4);
margin-bottom:15px;
}

.profile h1{
font-size:28px;
margin-bottom:5px;
}

.tag{
opacity:0.9;
margin-bottom:25px;
}

/* link buttons */

.link{
display:flex;
align-items:center;
justify-content:center;
gap:12px;

width:100%;
margin:10px 0;
padding:14px;

background:white;
color:#333;

border-radius:14px;
text-decoration:none;
font-weight:bold;

transition:0.25s;
}

.link:hover{
transform:scale(1.05);
background:#eaf3ff;
}

.link i{
font-size:20px;
}

/* social colors */

.instagram i{color:#E1306C;}
.tiktok i{color:#000;}
.discord i{color:#5865F2;}
.spotify i{color:#1DB954;}
.youtube i{color:#FF0000;}
.linkedin i{color:#0A66C2;}

/* floating circles */

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.12);
animation:float 12s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-20vh);}
}

</style>
</head>

<body>

<div class="container">

<div class="profile">

<img src="https://i.imgur.com/yourphoto.jpg">

<h1>Rafi Dwi Kurniawan</h1>
<div class="tag">Mahasiswa Teknik Industri</div>

</div>

<a class="link instagram" href="#">
<i class="fa-brands fa-instagram"></i> Instagram
</a>

<a class="link tiktok" href="#">
<i class="fa-brands fa-tiktok"></i> TikTok
</a>

<a class="link discord" href="#">
<i class="fa-brands fa-discord"></i> Discord
</a>

<a class="link spotify" href="#">
<i class="fa-brands fa-spotify"></i> Spotify
</a>

<a class="link youtube" href="#">
<i class="fa-brands fa-youtube"></i> YouTube
</a>

<a class="link linkedin" href="#">
<i class="fa-brands fa-linkedin"></i> LinkedIn
</a>

</div>

<!-- background animation -->

<div class="circle" style="width:40px;height:40px;left:10%;animation-duration:10s"></div>
<div class="circle" style="width:25px;height:25px;left:25%;animation-duration:9s"></div>
<div class="circle" style="width:35px;height:35px;left:45%;animation-duration:14s"></div>
<div class="circle" style="width:20px;height:20px;left:60%;animation-duration:8s"></div>
<div class="circle" style="width:50px;height:50px;left:80%;animation-duration:12s"></div>

</body>
</html>
