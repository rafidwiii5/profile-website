<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rafi Phone</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(160deg,#0f172a,#020617);

}

/* phone */

.phone{

width:320px;
height:640px;

background:#020617;

border-radius:36px;

padding:12px;

box-shadow:0 20px 70px rgba(0,0,0,0.6);

}

/* screen */

.screen{

width:100%;
height:100%;

border-radius:28px;

background:linear-gradient(#1e293b,#020617);

padding:20px;

color:white;

position:relative;
overflow:hidden;

}

/* profile */

.profile{

text-align:center;
margin-bottom:25px;

}

.profile img{

width:70px;
height:70px;

border-radius:50%;

margin-bottom:8px;

}

.profile h2{
font-size:17px;
}

.profile p{

font-size:12px;
color:#9ca3af;

}

/* apps grid */

.apps{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-top:20px;

}

.app{

text-align:center;
cursor:pointer;

transition:.2s;

}

.app:hover{
transform:scale(1.05);
}

.icon{

width:58px;
height:58px;

background:rgba(255,255,255,0.1);

border-radius:16px;

display:flex;
align-items:center;
justify-content:center;

font-size:24px;

margin:auto;
margin-bottom:6px;

}

/* screens */

.page{

position:absolute;
top:0;
left:0;

width:100%;
height:100%;

background:linear-gradient(#1e293b,#020617);

padding:20px;

transform:translateX(100%);
transition:0.4s;

}

.page.active{
transform:translateX(0);
}

/* back */

.back{

cursor:pointer;
margin-bottom:15px;

color:#9ca3af;

}

/* links */

.links{

display:flex;
flex-direction:column;
gap:12px;

}

.link{

background:rgba(255,255,255,0.08);

padding:12px;

border-radius:12px;

text-decoration:none;

color:white;

display:flex;
align-items:center;
gap:10px;

}

</style>

</head>

<body>

<div class="phone">

<div class="screen">

<!-- HOME -->

<div id="home">

<div class="profile">

<img src="https://i.pravatar.cc/150?img=12">

<h2>Rafi</h2>
<p>Developer</p>

</div>

<div class="apps">

<div class="app" onclick="openPage('social')">
<div class="icon"><i class="fa-solid fa-share-nodes"></i></div>
<p>Social</p>
</div>

<div class="app">
<div class="icon"><i class="fa-solid fa-image"></i></div>
<p>Gallery</p>
</div>

<div class="app">
<div class="icon"><i class="fa-solid fa-music"></i></div>
<p>Music</p>
</div>

<div class="app">
<div class="icon"><i class="fa-solid fa-note-sticky"></i></div>
<p>Notes</p>
</div>

<div class="app">
<div class="icon"><i class="fa-solid fa-user"></i></div>
<p>About</p>
</div>

<div class="app">
<div class="icon"><i class="fa-solid fa-gear"></i></div>
<p>Settings</p>
</div>

</div>

</div>

<!-- SOCIAL PAGE -->

<div id="social" class="page">

<div class="back" onclick="closePage()">
← Back
</div>

<h3>My Socials</h3>

<div class="links">

<a class="link"
href="https://instagram.com/rpiidka">
<i class="fa-brands fa-instagram"></i>
Instagram
</a>

<a class="link"
href="https://tiktok.com/@irappp5">
<i class="fa-brands fa-tiktok"></i>
TikTok
</a>

<a class="link"
href="https://discord.com/users/rapiidka">
<i class="fa-brands fa-discord"></i>
Discord
</a>

<a class="link"
href="https://open.spotify.com">
<i class="fa-brands fa-spotify"></i>
Spotify
</a>

<a class="link"
href="https://youtube.com/@jebengg">
<i class="fa-brands fa-youtube"></i>
YouTube
</a>

<a class="link"
href="https://linkedin.com">
<i class="fa-brands fa-linkedin"></i>
LinkedIn
</a>

</div>

</div>

</div>

</div>

<script>

function openPage(id){

document.getElementById(id).classList.add("active")

}

function closePage(){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"))

}

</script>

</body>
</html>
