<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iPhone UI</title>

<style>

body{
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* PHONE */

.phone{
width:330px;
height:690px;
border-radius:50px;
border:10px solid black;
overflow:hidden;
position:relative;
background:black;
}

/* NOTCH */

.notch{
position:absolute;
top:8px;
left:50%;
transform:translateX(-50%);
width:120px;
height:28px;
background:black;
border-radius:20px;
z-index:10;
}

/* LOCKSCREEN */

#lockscreen{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1517816428104-797678c7cf0c") center/cover;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
color:white;
transition:1s;
}

.time{
font-size:72px;
margin-top:110px;
opacity:0;
animation:fade 1s forwards;
animation-delay:0.5s;
}

.bar{
width:120px;
height:5px;
background:white;
border-radius:5px;
margin-bottom:40px;
opacity:0;
animation:fade 1s forwards;
animation-delay:1s;
}

/* HOME */

#home{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1517816428104-797678c7cf0c") center/cover;
display:flex;
flex-direction:column;
justify-content:space-between;
opacity:0;
transition:1s;
}

/* APP GRID */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:110px 20px 0;
}

.app{
text-align:center;
color:white;
font-size:12px;
opacity:0;
transform:translateY(10px);
animation:appin 0.6s forwards;
}

.app:nth-child(1){animation-delay:0.2s;}
.app:nth-child(2){animation-delay:0.3s;}
.app:nth-child(3){animation-delay:0.4s;}
.app:nth-child(4){animation-delay:0.5s;}
.app:nth-child(5){animation-delay:0.6s;}

.app img{
width:60px;
border-radius:18px;
}

/* DOCK */

.dock{
display:flex;
justify-content:space-around;
align-items:center;
margin:20px;
padding:10px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
border-radius:25px;
}

.dock img{
width:55px;
border-radius:15px;
}

/* ANIMATION */

.unlock #lockscreen{
transform:translateY(-100%);
}

.unlock #home{
opacity:1;
}

/* KEYFRAMES */

@keyframes fade{
to{opacity:1;}
}

@keyframes appin{
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="phone" id="phone">

<div class="notch"></div>

<div id="lockscreen">
<div class="time">09:41</div>
<div class="bar"></div>
</div>

<div id="home">

<div class="grid">

<div class="app">
<a href="https://instagram.com/USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>
<p>Instagram</p>
</div>

<div class="app">
<a href="https://tiktok.com/@USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
</a>
<p>TikTok</p>
</div>

<div class="app">
<a href="https://youtube.com/@USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>
<p>YouTube</p>
</div>

<div class="app">
<a href="https://linkedin.com/in/USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/145/145807.png">
</a>
<p>LinkedIn</p>
</div>

</div>

<div class="dock">

<a href="https://open.spotify.com/user/USERNAME">
<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
</a>

<img src="https://cdn-icons-png.flaticon.com/512/15/15874.png">
<img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
<img src="https://cdn-icons-png.flaticon.com/512/724/724664.png">

</div>

</div>

</div>

<script>

setTimeout(()=>{
document.getElementById("phone").classList.add("unlock")
},2000)

</script>

</body>
</html>
